version: 2
updates:
  # ルートの npm 依存（Capacitor / 生成・テスト用ツール）
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'

  # インフラ（AWS CDK）の npm 依存
  - package-ecosystem: npm
    directory: '/infra'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps-infra)'

  # GitHub Actions のバージョン更新
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(ci)'
