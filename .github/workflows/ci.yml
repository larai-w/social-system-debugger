name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── フロント: engine.js のユニットテスト + 週替わりJSONスキーマ検証 ──
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check web assets exist
        run: |
          for f in web/index.html web/js/engine.js web/js/ui.js web/js/scenario.js; do
            [ -f "$f" ] || { echo "❌ missing $f"; exit 1; }
          done
          echo "✅ web assets present"

      - name: Install dev deps (eslint / prettier)
        run: npm ci

      - name: Check (tests + weekly JSON + eslint + prettier — mirrors `make check`)
        run: npm run check

  # ── ブラウザ実機検証: Console ゼロ（Chart.js 正常/失敗の両ケース・4タブ・プリセット・スライダー）──
  # ローカルの `make verify` と同一スクリプト。web/infra とは独立ジョブ（ブランチ保護の必須には未指定＝助言的）。
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Browser verification (scripts/verify.mjs)
        run: npm run verify
      # T62: PWA オフライン起動もPRごとに検証（SW登録→回線遮断→リロード。ジョブ自体が助言的なのは従来どおり）
      - name: Offline-start verification (scripts/verify-offline.mjs)
        run: npm run verify:offline
      # 静的ページ群（classroom/slides/privacy/announce-cards）の Console ゼロ＋構造を検証（助言的）
      - name: Static-pages verification (scripts/verify-pages.mjs)
        run: npm run verify:pages

  # ── インフラ: cdk synth が通ることの確認 ──
  infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install infra deps
        run: npm ci
      - name: cdk synth
        run: npx cdk synth --quiet
        env:
          CDK_DEFAULT_REGION: ap-northeast-1
