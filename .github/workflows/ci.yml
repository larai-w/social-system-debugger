name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── フロント: engine.js のユニットテスト + 週替わりJSONスキーマ検証 ──
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check web assets exist
        run: |
          for f in web/index.html web/js/engine.js web/js/ui.js web/js/scenario.js; do
            [ -f "$f" ] || { echo "❌ missing $f"; exit 1; }
          done
          echo "✅ web assets present"

      - name: Unit tests (engine.js — pure logic, node:test, no deps)
        run: node --test 'tests/*.test.mjs'

      - name: Validate weekly scenario JSON (schema + ja/en presence)
        run: node scripts/validate-weekly.mjs

  # ── インフラ: cdk synth が通ることの確認 ──
  infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install infra deps
        run: npm ci
      - name: cdk synth
        run: npx cdk synth --quiet
        env:
          CDK_DEFAULT_REGION: ap-northeast-1
