name: Weekly scenario rotation

# 毎週月曜 0:00 JST（日曜 15:00 UTC）に、その週の content/weekly/<ISO週>.json を
# latest.json へコピーして main へ反映する。
# 反映手段: main は branch protection 下（直接 push 不可）なので、一意ブランチに push →
# PR 作成 → squash auto-merge を予約する。required checks が green になり次第マージされる。
# 注意: GITHUB_TOKEN によるマージの push は他ワークフローを発火させない（GitHub の再帰防止）ため、
# マージ完了を待ってから Pages / AWS のデプロイを workflow_dispatch で明示的に起動する。
# 在庫が無い週は失敗させて通知する（＝「シナリオを書き足す」リマインダーを兼ねる）。
on:
  schedule:
    - cron: '0 15 * * 0' # 日曜 15:00 UTC = 月曜 0:00 JST
  workflow_dispatch: # 手動でも回せる（作り直した週の即時反映など）

permissions:
  contents: write
  pull-requests: write # main は branch protection 下 — 直接 push 不可なので PR 経由で反映する
  actions: write # 後続デプロイの workflow_dispatch 起動に必要
  issues: write # 失敗時に「作業指示書つき Issue」を自動起票するために必要

concurrency:
  group: weekly-rotate
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Rotate latest.json to this week's scenario (JST)
        id: rotate
        # main は branch protection（required checks: web/infra・linear history）下にあり
        # GITHUB_TOKEN の直接 push は GH006 で拒否される。よって一意ブランチに commit & push し、
        # PR を作成して squash auto-merge を予約する（required checks が green になり次第マージ）。
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          WEEK_ID=$(TZ=Asia/Tokyo date +%G-W%V)
          SRC="content/weekly/${WEEK_ID}.json"
          echo "今週: ${WEEK_ID}"
          if [ ! -f "$SRC" ]; then
            echo "::error::${SRC} がありません。週替わりシナリオの在庫切れです — 新しい週のJSONを追加してください。"
            exit 1
          fi
          if cmp -s "$SRC" content/weekly/latest.json; then
            echo "latest.json は既に ${WEEK_ID} です。何もしません。"
            echo "rotated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cp "$SRC" content/weekly/latest.json
          # run_id 入りの一意ブランチ名で冪等性を確保（同名ブランチ残骸で落ちない）。
          BRANCH="weekly-rotate/${WEEK_ID}-${GITHUB_RUN_ID}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add content/weekly/latest.json
          git commit -m "content: rotate latest.json to ${WEEK_ID}"
          # -f で万一の残骸も上書き（run_id 入りで衝突はまず無いが冪等に）。
          git push -f origin "$BRANCH"
          # PR 作成 → squash で auto-merge 予約（linear history 必須のため squash）。
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "content: rotate latest.json to ${WEEK_ID}" \
            --body "Automated weekly rotation to ${WEEK_ID}. Auto-merges once required checks pass."
          gh pr merge "$BRANCH" --auto --squash
          # GITHUB_TOKEN が作った PR は pull_request イベントの CI を発火させない
          # （GitHub の再帰防止）。required checks（web/infra）を満たすため、
          # CI をこのブランチ上で明示ディスパッチする（デプロイ起動と同じ手法）。
          gh workflow run ci.yml --ref "$BRANCH"
          echo "rotated=true" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Trigger deploys (Pages + AWS)
        if: steps.rotate.outputs.rotated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ steps.rotate.outputs.branch }}
        run: |
          # auto-merge は非同期（required checks 通過を待つ）。GITHUB_TOKEN による
          # マージの push は deploy.yml/deploy-aws.yml を発火させない（再帰防止）ため、
          # PR が main にマージされたのを待ってから明示的にデプロイをディスパッチする。
          echo "PR (${BRANCH}) のマージ完了を待機します（最大 ~20 分）…"
          MERGED=""
          for i in $(seq 1 40); do
            STATE=$(gh pr view "$BRANCH" --json state -q .state 2>/dev/null || echo "")
            if [ "$STATE" = "MERGED" ]; then
              MERGED="yes"
              echo "PR がマージされました。"
              break
            fi
            if [ "$STATE" = "CLOSED" ]; then
              echo "::error::PR が（マージされずに）クローズされました。デプロイを中止します。"
              exit 1
            fi
            sleep 30
          done
          if [ -z "$MERGED" ]; then
            echo "::error::タイムアウト内に PR がマージされませんでした（checks 未通過の可能性）。デプロイを中止します。"
            exit 1
          fi
          gh workflow run deploy.yml --ref main -R "$GH_REPO"
          # AWS 側は Secrets 未設定なら deploy-aws.yml 内の if でスキップされる（安全）
          gh workflow run deploy-aws.yml --ref main -R "$GH_REPO"

      # 失敗時（多くは在庫切れ = 意図的な exit 1）に、直し方を書いた Issue を自動起票する。
      # ITIL: インシデント（赤い Actions）を、そのまま実行できるサービス要求（作業指示書）へ変換する。
      # 冪等: restock ラベルの open Issue が既にあれば新規起票せずコメント追記のみ（毎週の重複起票を防ぐ）。
      - name: Open a "restock" issue with a ready-to-paste prompt
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'restock';
            // 今週の ISO 週（JST）— 症状メッセージに使う
            const weekId = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Tokyo' })
              .format(new Date()); // フォールバック用の日付表示（週番号は本文で run ログ参照に委ねる）
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // restock ラベルが無ければ作る（失敗しても続行 — 起票は色なしでも成立させる）
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'd93f0b',
                description: '週替わりシナリオの在庫補充・週次ローテ失敗のトリアージ',
              });
            } catch (e) {
              // 既存（HTTP 422）や権限で失敗しても無視して続行
              core.info(`ラベル作成はスキップ（既存 or 失敗）: ${e.message}`);
            }

            // 本文（日本語）— そのまま Claude Code に貼れるプロンプトを同梱する
            const body = [
              '## 症状',
              `週次ローテ（\`Weekly scenario rotation\`）が失敗しました（実行日 JST: ${weekId}）。`,
              `今週分の \`content/weekly/<ISO週>.json\` を \`latest.json\` へ切り替える処理が完了していません。`,
              '',
              `- 実行ログ: ${runUrl}`,
              '',
              '## 切り分け',
              '在庫切れ（意図的な失敗）か、それ以外（push/ディスパッチ等）かを判定してください。',
              '手順は運用ランブック §1 を参照:',
              '[docs/operations-runbook.md#1-週次ローテが失敗した](../blob/main/docs/operations-runbook.md#1-週次ローテが失敗した)',
              '',
              '- **在庫切れ**の場合 → 下記プロンプトで次の週分を補充する（完全委任タスク）。',
              '- **それ以外**（在庫はある）→ ランブック §1 の (B) に従う（push 競合の再実行・`actions: write` 権限・後続ワークフロー名）。',
              '',
              '## そのまま Claude Code に貼れるプロンプト（在庫切れ時）',
              '```',
              '次の4週分の週次シナリオ（content/weekly/<ISO週>.json）を作って。',
              '既存の週次 JSON と同じスキーマ・日英完備で、実名ゼロ・構造で語ること。',
              '受け入れは `npm run check`（週次JSONスキーマ検証＋クリア到達可能性CIを含む）を green にすること。',
              '完全委任フローと受け入れ基準は AGENTS.md「完全委任タスクの例」を参照。コミットは親が行う。',
              '```',
              '',
              '_この Issue は週次ローテ失敗時に自動起票されました。復旧後はクローズしてください。_',
            ].join('\n');

            // 冪等チェック: restock ラベルの open Issue を探す
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              // 既にある → 重複起票せずコメントで追記のみ
              const issueNumber = existing.data[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `週次ローテが再度失敗しました（実行日 JST: ${weekId}）。\n\n- 実行ログ: ${runUrl}`,
              });
              core.info(`既存 Issue #${issueNumber} にコメント追記しました。`);
            } else {
              // 無い → 新規起票
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[auto] Weekly rotation failed — restock or triage needed',
                body,
                labels: [label],
              });
              core.info(`新規 Issue #${created.data.number} を起票しました。`);
            }
