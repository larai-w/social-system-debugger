name: Weekly scenario rotation

# 毎週月曜 0:00 JST（日曜 15:00 UTC）に、その週の content/weekly/<ISO週>.json を
# latest.json へコピーして自動コミットする。
# 注意: GITHUB_TOKEN による push は他ワークフローを発火させない（GitHub の再帰防止）ため、
# ローテ後に Pages / AWS のデプロイを workflow_dispatch で明示的に起動する。
# 在庫が無い週は失敗させて通知する（＝「シナリオを書き足す」リマインダーを兼ねる）。
on:
  schedule:
    - cron: '0 15 * * 0' # 日曜 15:00 UTC = 月曜 0:00 JST
  workflow_dispatch: # 手動でも回せる（作り直した週の即時反映など）

permissions:
  contents: write
  actions: write # 後続デプロイの workflow_dispatch 起動に必要

concurrency:
  group: weekly-rotate
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rotate latest.json to this week's scenario (JST)
        id: rotate
        run: |
          WEEK_ID=$(TZ=Asia/Tokyo date +%G-W%V)
          SRC="content/weekly/${WEEK_ID}.json"
          echo "今週: ${WEEK_ID}"
          if [ ! -f "$SRC" ]; then
            echo "::error::${SRC} がありません。週替わりシナリオの在庫切れです — 新しい週のJSONを追加してください。"
            exit 1
          fi
          if cmp -s "$SRC" content/weekly/latest.json; then
            echo "latest.json は既に ${WEEK_ID} です。何もしません。"
            echo "rotated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cp "$SRC" content/weekly/latest.json
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/weekly/latest.json
          git commit -m "content: rotate latest.json to ${WEEK_ID}"
          git push
          echo "rotated=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploys (Pages + AWS)
        if: steps.rotate.outputs.rotated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --ref main -R "$GITHUB_REPOSITORY"
          # AWS 側は Secrets 未設定なら deploy-aws.yml 内の if でスキップされる（安全）
          gh workflow run deploy-aws.yml --ref main -R "$GITHUB_REPOSITORY"
