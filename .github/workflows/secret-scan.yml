# T47: シークレットスキャン（gitleaks）— 公開リポジトリの恒久ガード
#   push / PR ごとに全履歴を走査し、アクセスキー・トークン等の混入を検出したら失敗させる。
#   2026-07-09 の手動監査（混入ゼロ）を CI として恒久化するもの。
name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # 全履歴を走査
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
