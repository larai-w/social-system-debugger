<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — 社会デバッガー</title>
<meta name="description" content="このアドレスは存在しません。社会デバッガーのトップページへ戻ってください。">
<!--
  GitHub Pages はルートの 404.html を自動で採用する。
  アプリ本体の i18n/JS には依存しない自己完結ページ。
  SW 制御下のクライアントは navigate フェッチをオフライン時に index.html へフォールバックするため、
  この 404 が表示されるのはオンライン直アクセス時に限られる。
-->
<style>
  :root{--bg0:#070b14;--bg1:#0b1220;--cy:#39d5ff;--grn:#3ef58c;--ora:#ffb74d;--pur:#c792ea;
        --tx:#cfe3ee;--muted:#7b93a4;--bdr:#1d3345;}
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{margin:0;background:var(--bg0);color:var(--tx);
       font-family:"SFMono-Regular",Consolas,"Courier New",Menlo,monospace;
       display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .frame{max-width:600px;width:100%;}
  .code{font-size:clamp(3rem,12vw,6rem);color:var(--cy);margin:0;letter-spacing:.04em;
        text-shadow:0 0 32px rgba(57,213,255,.4);line-height:1;}
  .label{font-size:.8rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;
         margin:4px 0 20px;}
  .msg-ja{font-size:1.05rem;color:var(--tx);margin:0 0 4px;}
  .msg-en{font-size:.78rem;color:var(--muted);margin:0 0 28px;}
  .home-link{display:inline-block;border:1px solid var(--cy);border-radius:6px;
             padding:10px 22px;color:var(--cy);text-decoration:none;font-size:.85rem;
             letter-spacing:.06em;background:var(--bg1);transition:background .15s,color .15s;}
  .home-link:hover{background:var(--cy);color:var(--bg0);}
  .divider{border:none;border-top:1px solid var(--bdr);margin:28px 0;}
  .disclaimer{font-size:.7rem;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
<div class="frame">
  <p class="code">404</p>
  <p class="label">— SEGMENT NOT FOUND —</p>
  <p class="msg-ja">このアドレスは存在しないか、まだ生成されていません。</p>
  <p class="msg-en">This address does not exist, or has not been generated yet.</p>
  <a class="home-link" href="./">← トップへ戻る / Back to Home</a>
  <hr class="divider">
  <p class="disclaimer">※ 特定の誰かではなく、どの社会にも起こる構造の話です。</p>
</div>
</body>
</html>
